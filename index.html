<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IronForge — Panduan Workout</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy: #0a0f1e;
      --navy-2: #0d1530;
      --navy-3: #111d3c;
      --blue-mid: #1a3a6e;
      --blue-bright: #1e6fff;
      --blue-electric: #00c2ff;
      --blue-glow: #00eaff;
      --accent: #ff6a00;
      --text-primary: #e8f4ff;
      --text-secondary: #8ab4d4;
      --text-muted: #4a6a8a;
      --card-bg: rgba(14, 30, 65, 0.7);
      --sidebar-w: 280px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--navy);
      color: var(--text-primary);
      font-family: 'Barlow', sans-serif;
      font-weight: 400;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* === ANIMATED BG === */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 0%, rgba(30,111,255,0.18) 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 85% 90%, rgba(0,194,255,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(0,234,255,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grid lines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(30,111,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30,111,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* === HEADER === */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 64px;
      background: rgba(10,15,30,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(30,111,255,0.2);
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 100;
      gap: 16px;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 4px;
      background: linear-gradient(90deg, var(--blue-bright), var(--blue-electric));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      flex-shrink: 0;
    }

    .logo span {
      background: linear-gradient(90deg, var(--blue-glow), #fff);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .header-tagline {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      letter-spacing: 3px;
      color: var(--text-muted);
      text-transform: uppercase;
      border-left: 1px solid rgba(30,111,255,0.3);
      padding-left: 16px;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-badge {
      background: linear-gradient(135deg, var(--blue-bright), var(--blue-electric));
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 4px 12px;
      border-radius: 2px;
      text-transform: uppercase;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
      background: none;
      border: none;
    }
    .hamburger span {
      width: 24px;
      height: 2px;
      background: var(--blue-electric);
      border-radius: 2px;
      transition: all 0.3s;
      display: block;
    }

    /* === LAYOUT === */
    .app {
      display: flex;
      margin-top: 64px;
      min-height: calc(100vh - 64px);
      position: relative;
      z-index: 1;
    }

    /* === SIDEBAR === */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: rgba(9, 14, 30, 0.95);
      border-right: 1px solid rgba(30,111,255,0.15);
      position: fixed;
      top: 64px;
      bottom: 0;
      left: 0;
      overflow-y: auto;
      z-index: 50;
      padding: 24px 0 40px;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: rgba(30,111,255,0.3); border-radius: 4px; }

    .sidebar-section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--text-muted);
      text-transform: uppercase;
      padding: 0 20px 10px;
      border-bottom: 1px solid rgba(30,111,255,0.1);
      margin-bottom: 8px;
    }

    .sidebar-section-label:not(:first-child) { margin-top: 24px; }

    .muscle-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 11px 20px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      font-weight: 600;
      text-align: left;
      border-left: 3px solid transparent;
      transition: all 0.2s;
      position: relative;
    }

    .muscle-btn:hover {
      background: rgba(30,111,255,0.08);
      color: var(--blue-electric);
      border-left-color: rgba(30,111,255,0.4);
    }

    .muscle-btn.active {
      background: linear-gradient(90deg, rgba(30,111,255,0.18), transparent);
      color: #fff;
      border-left-color: var(--blue-electric);
    }

    .muscle-btn.active .btn-icon { color: var(--blue-glow); }

    .btn-icon {
      font-size: 20px;
      width: 28px;
      text-align: center;
      flex-shrink: 0;
    }

    .btn-label { flex: 1; }

    .btn-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      letter-spacing: 1px;
      background: rgba(30,111,255,0.2);
      color: var(--blue-electric);
      padding: 2px 6px;
      border-radius: 2px;
    }

    .muscle-btn.active .btn-badge {
      background: var(--blue-bright);
      color: #fff;
    }

    /* Body diagram */
    .body-diagram-wrap {
      padding: 16px 20px 8px;
      text-align: center;
    }

    .body-diagram {
      width: 100%;
      max-width: 180px;
      opacity: 0.7;
      filter: drop-shadow(0 0 16px rgba(0,194,255,0.3));
    }

    /* === MAIN CONTENT === */
    main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 40px 48px;
      max-width: 100%;
    }

    /* === HERO PANEL === */
    .hero-panel {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid rgba(30,111,255,0.25);
      background: linear-gradient(135deg, var(--navy-3) 0%, rgba(10,25,60,0.9) 100%);
      padding: 48px 48px 48px;
      margin-bottom: 32px;
    }

    .hero-panel::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(0,194,255,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-panel::after {
      content: attr(data-muscle);
      position: absolute;
      right: 32px; bottom: -10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 120px;
      letter-spacing: 6px;
      color: rgba(30,111,255,0.07);
      line-height: 1;
      pointer-events: none;
      white-space: nowrap;
    }

    .muscle-category {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--blue-electric);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .muscle-category::before {
      content: '';
      display: inline-block;
      width: 32px;
      height: 2px;
      background: var(--blue-electric);
    }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 6vw, 80px);
      letter-spacing: 4px;
      line-height: 1;
      color: #fff;
      margin-bottom: 16px;
    }

    .hero-title span {
      background: linear-gradient(90deg, var(--blue-bright), var(--blue-glow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-desc {
      font-size: 15px;
      font-weight: 300;
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 600px;
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      margin-top: 32px;
      flex-wrap: wrap;
    }

    .stat-item { text-align: center; }

    .stat-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 2px;
      background: linear-gradient(180deg, #fff, var(--blue-electric));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .stat-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .stat-divider {
      width: 1px;
      background: rgba(30,111,255,0.2);
      align-self: stretch;
    }

    /* === EXERCISE GRID === */
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 20px;
    }

    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(30,111,255,0.3), transparent);
    }

    .exercises-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .exercise-card {
      background: var(--card-bg);
      border: 1px solid rgba(30,111,255,0.15);
      border-radius: 6px;
      padding: 22px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
      cursor: pointer;
    }

    .exercise-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: linear-gradient(180deg, var(--blue-bright), var(--blue-electric));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .exercise-card:hover {
      border-color: rgba(30,111,255,0.4);
      background: rgba(14,30,70,0.8);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,100,255,0.12);
    }

    .exercise-card:hover::before { opacity: 1; }

    .card-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      color: rgba(30,111,255,0.1);
      position: absolute;
      top: 12px; right: 16px;
      line-height: 1;
      transition: color 0.3s;
    }

    .exercise-card:hover .card-num { color: rgba(0,194,255,0.15); }

    .card-difficulty {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .diff-beginner { color: #00e676; }
    .diff-intermediate { color: #ffb300; }
    .diff-advanced { color: #ff3d00; }

    .diff-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 6px currentColor;
    }

    .card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #fff;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .card-desc {
      font-size: 13px;
      font-weight: 300;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      background: rgba(30,111,255,0.12);
      border: 1px solid rgba(30,111,255,0.2);
      color: var(--blue-electric);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
    }

    /* === TIPS SECTION === */
    .tips-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }

    .tip-card {
      background: rgba(9,20,50,0.6);
      border: 1px solid rgba(30,111,255,0.12);
      border-radius: 6px;
      padding: 18px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .tip-icon {
      font-size: 24px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .tip-content {}

    .tip-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--blue-electric);
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .tip-text {
      font-size: 13px;
      font-weight: 300;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* === WORKOUT PLAN === */
    .plan-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 32px;
    }

    .plan-table th {
      background: rgba(30,111,255,0.12);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--blue-electric);
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid rgba(30,111,255,0.2);
    }

    .plan-table td {
      padding: 12px 16px;
      font-size: 14px;
      color: var(--text-secondary);
      border-bottom: 1px solid rgba(30,111,255,0.07);
    }

    .plan-table tr:last-child td { border-bottom: none; }

    .plan-table tr:hover td {
      background: rgba(30,111,255,0.04);
      color: var(--text-primary);
    }

    .sets-reps {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      color: var(--blue-glow);
      font-size: 15px;
    }

    .rest-badge {
      background: rgba(255,106,0,0.1);
      color: #ff6a00;
      border: 1px solid rgba(255,106,0,0.2);
      padding: 2px 8px;
      border-radius: 2px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
    }

    /* === WELCOME SCREEN === */
    .welcome-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: 40px;
    }

    .welcome-icon {
      font-size: 80px;
      margin-bottom: 24px;
      filter: drop-shadow(0 0 32px rgba(0,194,255,0.5));
      animation: pulse-icon 3s ease-in-out infinite;
    }

    @keyframes pulse-icon {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 32px rgba(0,194,255,0.5)); }
      50% { transform: scale(1.05); filter: drop-shadow(0 0 48px rgba(0,234,255,0.7)); }
    }

    .welcome-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 56px;
      letter-spacing: 6px;
      background: linear-gradient(90deg, var(--blue-bright), var(--blue-glow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .welcome-sub {
      font-size: 16px;
      font-weight: 300;
      color: var(--text-secondary);
      max-width: 420px;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .muscle-quick-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      max-width: 500px;
    }

    .quick-btn {
      background: rgba(30,111,255,0.1);
      border: 1px solid rgba(30,111,255,0.25);
      color: var(--text-secondary);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .quick-btn:hover {
      background: rgba(30,111,255,0.25);
      color: var(--blue-electric);
      border-color: var(--blue-electric);
      transform: translateY(-1px);
    }

    /* === PROGRESS BAR === */
    .progress-section {
      background: var(--card-bg);
      border: 1px solid rgba(30,111,255,0.15);
      border-radius: 6px;
      padding: 24px;
      margin-bottom: 32px;
    }

    .progress-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .muscle-groups-progress {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .prog-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .prog-label {
      font-size: 13px;
      color: var(--text-secondary);
      width: 100px;
      flex-shrink: 0;
    }

    .prog-bar {
      flex: 1;
      height: 4px;
      background: rgba(30,111,255,0.12);
      border-radius: 4px;
      overflow: hidden;
    }

    .prog-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--blue-bright), var(--blue-electric));
      box-shadow: 0 0 8px rgba(0,194,255,0.4);
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .prog-pct {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      color: var(--blue-electric);
      width: 36px;
      text-align: right;
    }

    /* === OVERLAY (mobile) === */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 64px 0 0 0;
      background: rgba(0,0,0,0.6);
      z-index: 40;
    }

    /* === RESPONSIVE === */
    @media (max-width: 900px) {
      :root { --sidebar-w: 260px; }
      main { padding: 24px; }
      .hero-panel { padding: 32px 24px; }
      .hero-panel::after { display: none; }
    }

    @media (max-width: 700px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .sidebar-overlay.show { display: block; }
      main { margin-left: 0; padding: 20px 16px; }
      .hamburger { display: flex; }
      .header-tagline { display: none; }
      .exercises-grid { grid-template-columns: 1fr; }
      .tips-grid { grid-template-columns: 1fr; }
      .hero-stats { gap: 20px; }
    }

    /* Fade-in animation */
    .content-panel {
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <button class="hamburger" id="hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <div class="logo">Iron<span>Forge</span></div>
  <div class="header-tagline">Panduan Workout Profesional</div>
  <div class="header-right">
    <div class="header-badge">Pro Guide</div>
  </div>
</header>

<div class="sidebar-overlay" id="overlay"></div>

<!-- APP WRAPPER -->
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="body-diagram-wrap">
      <!-- Simple SVG body silhouette -->
      <svg class="body-diagram" viewBox="0 0 100 220" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e6fff" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#00c2ff" stop-opacity="0.3"/>
          </linearGradient>
        </defs>
        <!-- Head -->
        <circle cx="50" cy="18" r="13" fill="url(#bodyGrad)" stroke="#1e6fff" stroke-width="1"/>
        <!-- Neck -->
        <rect x="44" y="30" width="12" height="10" rx="3" fill="url(#bodyGrad)" stroke="#1e6fff" stroke-width="0.5"/>
        <!-- Torso -->
        <path d="M28 42 Q50 38 72 42 L76 100 Q50 104 24 100 Z" fill="url(#bodyGrad)" stroke="#1e6fff" stroke-width="1"/>
        <!-- Left Arm -->
        <path d="M28 44 L14 58 L10 90 L16 92 L20 64 L32 52 Z" fill="url(#bodyGrad)" stroke="#1e6fff" stroke-width="0.8"/>
        <!-- Right Arm -->
        <path d="M72 44 L86 58 L90 90 L84 92 L80 64 L68 52 Z" fill="url(#bodyGrad)" stroke="#1e6fff" stroke-width="0.8"/>
        <!-- Left Forearm -->
        <path d="M10 90 L8 118 L14 120 L16 92 Z" fill="url(#bodyGrad)" stroke="#1e6fff" stroke-width="0.8"/>
        <!-- Right Forearm -->
        <path d="M90 90 L92 118 L86 120 L84 92 Z" fill="url(#bodyGrad)" stroke="#1e6fff" stroke-width="0.8"/>
        <!-- Left Leg -->

function showMuscle(key) {
  const data = muscleData[key];
  if (!data) return;

  // Update active button
  document.querySelectorAll('.muscle-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.muscle-btn').forEach(btn => {
    if (btn.getAttribute('onclick') === `showMuscle('${key}')`) btn.classList.add('active');
  });

  const diffClass = { beginner: 'diff-beginner', intermediate: 'diff-intermediate', advanced: 'diff-advanced' };
  const diffLabel = { beginner: 'Pemula', intermediate: 'Menengah', advanced: 'Lanjut' };

  const exerciseCards = data.exercises.map((ex, i) => `
    <div class="exercise-card">
      <div class="card-num">0${i+1}</div>
      <div class="card-difficulty ${diffClass[ex.diff]}">
        <span class="diff-dot"></span>${diffLabel[ex.diff]}
      </div>
      <div class="card-title">${ex.name}</div>
      <div class="card-desc">${ex.desc}</div>
      <div class="card-tags">${ex.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    </div>
  `).join('');

  const tipCards = data.tips.map(tip => `
    <div class="tip-card">
      <div class="tip-icon">${tip.icon}</div>
      <div class="tip-content">
        <div class="tip-title">${tip.title}</div>
        <div class="tip-text">${tip.text}</div>
      </div>
    </div>
  `).join('');

  const planRows = data.plan.map(p => `
    <tr>
      <td><strong style="color:#fff">${p.exercise}</strong></td>
      <td><span class="sets-reps">${p.sets}</span></td>
      <td><span class="sets-reps">${p.reps}</span></td>
      <td><span class="rest-badge">${p.rest}</span></td>
      <td style="color:var(--text-muted);font-size:12px">${p.note}</td>
    </tr>
  `).join('');

  const statsSection = data.sets > 0 ? `
    <div class="hero-stats">
      <div class="stat-item"><div class="stat-num">${data.exercises.length}</div><div class="stat-label">Latihan</div></div>
      <div class="stat-divider"></div>
      <div class="stat-item"><div class="stat-num">${data.sets}</div><div class="stat-label">Set / Sesi</div></div>
      <div class="stat-divider"></div>
      <div class="stat-item"><div class="stat-num">${data.rest.split(' ')[0]}</div><div class="stat-label">Istirahat</div></div>
    </div>
  ` : `
    <div class="hero-stats">
      <div class="stat-item"><div class="stat-num">${data.exercises.length}</div><div class="stat-label">Metode</div></div>
      <div class="stat-divider"></div>
      <div class="stat-item"><div class="stat-num">3x</div><div class="stat-label">Per Minggu</div></div>
      <div class="stat-divider"></div>
      <div class="stat-item"><div class="stat-num">❤️</div><div class="stat-label">Zone 2</div></div>
    </div>
  `;

  document.getElementById('content-area').innerHTML = `
    <div class="content-panel">
      <!-- HERO -->
      <div class="hero-panel" data-muscle="${data.name}">
        <div class="muscle-category">${data.icon} &nbsp; ${data.category}</div>
        <div class="hero-title">LATIHAN <span>${data.name}</span></div>
        <p class="hero-desc">${data.description}</p>
        ${statsSection}
      </div>

      <!-- EXERCISES -->
      <div class="section-header">
        <span class="section-title">Gerakan Latihan</span>
        <div class="section-line"></div>
      </div>
      <div class="exercises-grid">${exerciseCards}</div>

      <!-- TIPS -->
      <div class="section-header">
        <span class="section-title">Tips & Teknik</span>
        <div class="section-line"></div>
      </div>
      <div class="tips-grid">${tipCards}</div>

      <!-- WORKOUT PLAN TABLE -->
      <div class="section-header">
        <span class="section-title">Program Latihan</span>
        <div class="section-line"></div>
      </div>
      <table class="plan-table">
        <thead>
          <tr>
            <th>Gerakan</th>
            <th>Set</th>
            <th>Rep / Durasi</th>
            <th>Istirahat</th>
            <th>Catatan</th>
          </tr>
        </thead>
        <tbody>${planRows}</tbody>
      </table>
    </div>
  `;

  // Close sidebar on mobile
  if (window.innerWidth <= 700) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Hamburger menu
const hamburger = document.getElementById('hamburger');
const sidebar   = document.getElementById('sidebar');
const overlay   = document.getElementById('overlay');

hamburger.addEventListener('click', () => {
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
});

overlay.addEventListener('click', () => {
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
});
</script>
